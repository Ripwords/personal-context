name: braindump

services:
  postgres:
    # pgvector image is a drop-in superset of postgres:16 — required for the
    # optional semantic-memory/RAG path (apply drizzle/optional/pgvector.sql).
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  drizzle-migrate:
    build:
      context: .
      target: migrate
    image: braindump-migrate:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: run
    image: braindump-app:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      SEARXNG_URL: ${SEARXNG_URL:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      EMBEDDINGS_ENABLED: ${EMBEDDINGS_ENABLED:-0}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-nomic-embed-text}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      # Durable fallback for document originals when S3 is NOT configured.
      # (With S3_* set, uploads go to object storage and this is unused.)
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      drizzle-migrate:
        condition: service_completed_successfully

  # Optional embeddings model server. Pull the model once it's up:
  #   docker compose exec ollama ollama pull nomic-embed-text
  # Enable with EMBEDDINGS_ENABLED=1 (and apply drizzle/optional/pgvector.sql).
  ollama:
    image: ollama/ollama:latest
    profiles: ["embeddings"]
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  pgdata:
  uploads:
  ollama:
